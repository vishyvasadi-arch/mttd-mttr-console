<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#060912" />
    <meta name="description" content="MTTD & MTTR SaaS Console — Automated SLA Response Time Calculator" />
    <title>SLA Console · MTTD & MTTR</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet" />
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      html, body, #root { height: 100%; }
      body {
        background: #060912;
        color: #dde6f5;
        font-family: 'DM Mono', monospace;
        -webkit-font-smoothing: antialiased;
      }
      ::-webkit-scrollbar { width: 5px; height: 5px; }
      ::-webkit-scrollbar-track { background: #0b0e1a; }
      ::-webkit-scrollbar-thumb { background: #1e2640; border-radius: 3px; }
      input, textarea, select, button { font-family: inherit; }
      ::selection { background: #3b4fd820; color: #a5b4fc; }
    </style>
  </head>
  <body>
    <div id="root"></div>
  </body>
</html>
